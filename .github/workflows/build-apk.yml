name: Build APKs

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'master'
      - 'main'
      - 'vlad'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag to create (e.g. v2.0.0)'
        required: false
        type: string

jobs:
  build-driver-apk:
    name: Build Driver APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-driver-app-3.1/HexaRide-Driver-app-release-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Clean disk space
        run: |
          rm -rf build android/.gradle ~/.gradle 2>/dev/null || true
          df -h / || true

      - name: Setup release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && ! echo "$KEYSTORE_BASE64" | grep -q "placeholder"; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=app/release.jks\n' \
              "$KEYSTORE_PASS" "$KEY_PASS" "$KEY_ALIAS" > android/key.properties
          else
            echo "::warning::KEYSTORE_BASE64 secret missing/placeholder — this APK will be DEBUG-signed (sideload-only, not Play Store-ready)."
            echo "⚠️ **APK is DEBUG-signed** — set the \`KEYSTORE_BASE64\`/\`KEYSTORE_PASS\`/\`KEY_ALIAS\`/\`KEY_PASS\` secrets before any Play Store submission." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build release APK
        id: build
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
          # Exported to the process env (not just --dart-define) so Gradle's
          # System.getenv("MAPS_API_KEY") in android/app/build.gradle.kts resolves the real
          # key into the native manifest. If this repo secret is unset/empty the env var is
          # still present-but-empty; build.gradle.kts treats blank as unset and falls back to the
          # committed project key, so the APK never ships an empty key (which renders grey tiles).
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          set -o pipefail
          flutter build apk --release \
            --obfuscate --split-debug-info=build/symbols \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }} \
            --dart-define=BASE_URL=${{ vars.BASE_URL || 'https://dacatlon.store' }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} \
            --dart-define=ANDROID_MANIFEST_MAPBOX_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} \
            2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        run: |
          cat build.log
          find build/app/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"
          cat android/app/build.gradle.kts 2>/dev/null | head -30

      # Keep the deobfuscation symbols or obfuscated crash traces are unreadable.
      - name: Upload Driver symbols
        uses: actions/upload-artifact@v4
        with:
          name: vito-driver-symbols
          path: drivemond-driver-app-3.1/HexaRide-Driver-app-release-3.1/build/symbols
          if-no-files-found: warn
          retention-days: 90

      - name: Stage Driver APK
        run: |
          # Look for any APK (release or debug)
          APK=$(find build/app/outputs/flutter-apk -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "WARNING: No APK found in build/app/outputs/flutter-apk/"
            echo "Build may have failed or produced no artifacts"
            exit 0
          fi
          echo "Staging: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/vito-driver-release.apk"

      - name: Upload Driver Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vito-driver-release-apk
          path: ${{ github.workspace }}/vito-driver-release.apk
          if-no-files-found: warn
          retention-days: 14

  build-user-apk:
    name: Build User APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-user-app-3.1/HexaRide-User-app-release-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Clean disk space
        run: |
          rm -rf build android/.gradle ~/.gradle 2>/dev/null || true
          df -h / || true

      - name: Setup release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && ! echo "$KEYSTORE_BASE64" | grep -q "placeholder"; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=app/release.jks\n' \
              "$KEYSTORE_PASS" "$KEY_PASS" "$KEY_ALIAS" > android/key.properties
          else
            echo "::warning::KEYSTORE_BASE64 secret missing/placeholder — this APK will be DEBUG-signed (sideload-only, not Play Store-ready)."
            echo "⚠️ **APK is DEBUG-signed** — set the \`KEYSTORE_BASE64\`/\`KEYSTORE_PASS\`/\`KEY_ALIAS\`/\`KEY_PASS\` secrets before any Play Store submission." >> "$GITHUB_STEP_SUMMARY"
          fi


      - name: Check Stripe key secret
        env:
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$STRIPE_PUBLISHABLE_KEY" ]; then
            echo "::warning::STRIPE_PUBLISHABLE_KEY secret is empty — card payments will fail in this user APK."
            echo "⚠️ **STRIPE_PUBLISHABLE_KEY secret is empty** — card payments (ride + mart) will fail in this user APK." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build release APK
        id: build
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
          # Exported to the process env (not just --dart-define) so Gradle's
          # System.getenv("MAPS_API_KEY") in android/app/build.gradle.kts resolves the real
          # key into the native manifest. If this repo secret is unset/empty the env var is
          # still present-but-empty; build.gradle.kts treats blank as unset and falls back to the
          # committed project key, so the APK never ships an empty key (which renders grey tiles).
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          set -o pipefail
          flutter build apk --release \
            --obfuscate --split-debug-info=build/symbols \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }} \
            --dart-define=BASE_URL=${{ vars.BASE_URL || 'https://dacatlon.store' }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} \
            --dart-define=ANDROID_MANIFEST_MAPBOX_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} \
            2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        run: |
          cat build.log
          find build/app/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"

      # Keep the deobfuscation symbols or obfuscated crash traces are unreadable.
      - name: Upload User symbols
        uses: actions/upload-artifact@v4
        with:
          name: vito-user-symbols
          path: drivemond-user-app-3.1/HexaRide-User-app-release-3.1/build/symbols
          if-no-files-found: warn
          retention-days: 90

      - name: Stage User APK
        run: |
          # Look for any APK (release or debug)
          APK=$(find build/app/outputs/flutter-apk -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "WARNING: No APK found in build/app/outputs/flutter-apk/"
            echo "Build may have failed or produced no artifacts"
            exit 0
          fi
          echo "Staging: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/vito-user-release.apk"

      - name: Upload User Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vito-user-release-apk
          path: ${{ github.workspace }}/vito-user-release.apk
          if-no-files-found: warn
          retention-days: 14

  build-admin-zip:
    name: Build Admin ZIP
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-admin-new-install-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring,xml,ctype,json,bcmath,pdo_mysql

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --no-interaction --optimize-autoloader --ignore-platform-reqs

      - name: Create release ZIP
        working-directory: ${{ github.workspace }}
        run: |
          VERSION=$(grep '^version:' drivemond-user-app-3.1/HexaRide-User-app-release-3.1/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "Building admin ZIP for version $VERSION"
          # Exclude only true junk. Keep the storage/framework + storage/logs
          # DIRECTORIES (they carry .gitkeep, no cached content in a fresh CI
          # checkout) — dropping them made the extracted app fail at boot with
          # "Please provide a valid cache path". Strip cached *files* but leave
          # the dirs (and their .gitkeep) intact.
          zip -r "vito-admin-v${VERSION}.zip" drivemond-admin-new-install-3.1 \
            --exclude "*/node_modules/*" \
            --exclude "*/.git/*" \
            --exclude "*/.env" \
            --exclude "*/storage/logs/*.log" \
            --exclude "*/storage/framework/views/*.php"

      - name: Upload Admin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: vito-admin-zip
          path: vito-admin-v*.zip

  laravel-checks:
    name: Laravel Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-admin-new-install-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-reqs

      - name: PHP syntax check
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors" || true

  # iOS builds live in build-ios.yml (which disables Swift Package Manager —
  # required on the macOS runners) and signed distribution in release-ios.yml.

  create-release:
    name: Create GitHub Release
    needs: [build-driver-apk, build-user-apk, build-admin-zip]
    # Only cut a release from a version tag or the default branch — a feature-branch
    # push must never overwrite the published release for the current pubspec version.
    # Release model: main is the release branch — a push to main publishes a
    # GitHub Release for the CURRENT pubspec version (v$version). CONVENTION:
    # bump the app version BEFORE merging to main, or the existing release for
    # that version is overwritten. Tags (v*) and manual dispatch also publish.
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          elif echo "${{ github.ref }}" | grep -q '^refs/tags/'; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v$(grep '^version:' drivemond-user-app-3.1/HexaRide-User-app-release-3.1/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Download Driver Release APK
        uses: actions/download-artifact@v4
        with:
          name: vito-driver-release-apk
          path: release-assets/
        continue-on-error: true

      - name: Download User Release APK
        uses: actions/download-artifact@v4
        with:
          name: vito-user-release-apk
          path: release-assets/
        continue-on-error: true

      - name: Download Admin ZIP
        uses: actions/download-artifact@v4
        with:
          name: vito-admin-zip
          path: release-assets/
        continue-on-error: true

      - name: Check for release assets
        run: |
          echo "Checking release assets..."
          ls -la release-assets/ 2>/dev/null || echo "No release assets found"
          echo "Asset count: $(ls release-assets/ 2>/dev/null | wc -l)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Vito ${{ steps.ver.outputs.tag }}
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
